<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>漢字字形對比</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@400;700&family=Noto+Sans+JP:wght@400;700&family=Noto+Sans+SC:wght@400;700&family=Noto+Sans+TC:wght@400;700&family=Noto+Serif+HK:wght@400;700&family=Noto+Serif+JP:wght@400;700&family=Noto+Serif+SC:wght@400;700&family=Noto+Serif+TC:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <header>
        <h1>漢字字形對比</h1>
        <p>
          輸入一個漢字，查詢 OpenCC CDN 字表中的關聯字，再用 Noto Serif/Sans 的 SC、HK、TC、JP 字形渲染。
        </p>
      </header>

      <section class="controls" aria-label="input">
        <label for="charInput">輸入字</label>
        <input id="charInput" value="图" autocomplete="off" />
        <span class="control-label">字體</span>
        <fieldset class="font-options" id="familySelect" aria-label="字體">
          <label><input type="radio" name="fontFamily" value="serif" checked /> Serif</label>
          <label><input type="radio" name="fontFamily" value="sans" /> Sans</label>
        </fieldset>
        <button id="renderButton">對比</button>
        <button id="randomButton" type="button">隨機</button>
        <div id="randomCandidates" class="random-candidates" aria-label="隨機候選"></div>
      </section>

      <section class="panel">
        <h2>字形對比</h2>
        <div id="mappingStatus" class="status">Loading OpenCC CDN dictionaries…</div>
        <table class="glyph-table">
          <thead id="glyphHead"></thead>
          <tbody id="glyphBody"></tbody>
        </table>
      </section>

      <section class="notes">
        <h2>限制</h2>
        <ul>
          <li>候選字與「簡體」「繁體」「日文」等標籤由字表關係推斷，判定不一定準確，僅供參考。</li>
          <li>字形顯示取決於瀏覽器載入的字型；同一字元在不同地區字型中可能呈現不同寫法。</li>
          <li>這個工具適合快速對照字形與相關字，不應作為正式文字標準依據。</li>
        </ul>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
